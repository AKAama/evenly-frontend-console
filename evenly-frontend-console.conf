server {
      server_name evenly.ismyh.cn;

      root /var/www/evenly-frontend-console;
      index index.html;

      location / {
          try_files $uri $uri/ /index.html;
      }

      location /api/ {
          rewrite ^/api(.*) $1 break;
          proxy_http_version 1.1;

        # WebSocket（语音记账必须）
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Authorization $http_authorization;

        # 语音会话可能持续较久
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
       	  proxy_buffering off;
  	}

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/evenly.ismyh.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/evenly.ismyh.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
  server {
    if ($host = evenly.ismyh.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


      listen 80;
      server_name evenly.ismyh.cn;
    return 404; # managed by Certbot

}
